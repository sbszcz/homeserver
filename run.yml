---
- name: Homeserver
  hosts: all
  become: true

  roles:
    - role: system_prepare

    - role: ssh_prepare
      vars:
        ssh_prepare_pub_key_location: "{{ lookup('env','HOME')}}/.ssh/id_maintainer.pub"

    - role: docker

    # - role: portainer
    - role: paperless_prepare
    - role: homeassistant_prepare
    - role: komodo

    - role: immich_stack
