---
####################################################
# Preparating steps:
#
# Ensure mount points exists
####################################################
- name: "Ensure photos mount point exists"
  ansible.builtin.file:
    path: "/mnt/diskstation/photos"
    state: directory
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0755"

- name: "Ensure immich mount point exists"
  ansible.builtin.file:
    path: "/mnt/diskstation/immich"
    state: directory
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0755"

- name: Mount NFS diskstation photos folder
  ansible.posix.mount:
    path: /mnt/diskstation/photos
    src: "diskstation:/volume1/photo"
    fstype: nfs
    opts: "defaults,vers=3,nofail,soft,timeo=5,retry=1,bg"
    state: mounted
  become: true

- name: Mount NFS diskstation immich folder
  ansible.posix.mount:
    path: /mnt/diskstation/immich
    src: "diskstation:/volume1/immich"
    fstype: nfs
    opts: "defaults,vers=3,nofail,soft,timeo=5,retry=1,bg"
    state: mounted
  become: true
####################################################
# Check if stack exists and install
####################################################
- name: Authenticate and Check stack
  ansible.builtin.include_role:
    name: portainer_stacks
    tasks_from: authenticate_and_check_stack

- name: "Setup folder for stack"
  ansible.builtin.file:
    path: "/home/{{ host_user }}/{{ container_data }}/{{ stack_name }}"
    state: directory
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0755"
  when: jwt_token is defined and stack_not_exists

- name: "Setup sub folders"
  ansible.builtin.file:
    path: "/home/{{ host_user }}/{{ container_data }}/{{ stack_name }}/{{ sub_directory }}"
    state: directory
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0755"
  loop:
    - library
    - postgres_data
  loop_control:
    loop_var: sub_directory
  when: stack_not_exists

- name: "Deploy {{ stack_name }}"
  ansible.builtin.include_role:
    name: portainer_stacks
    tasks_from: create_stack
  vars:
    stack_compose: "{{ lookup('ansible.builtin.template', 'immich.yml') }}"
    stack_compose_env:
      - name: DB_PASSWORD
        value: "{{ immich_db_password }}"
